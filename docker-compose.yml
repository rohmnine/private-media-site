services:
  private-media-hub:
    build: .
    container_name: private-media-hub
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      MEDIA_HUB_PASSWORD: ${MEDIA_HUB_PASSWORD:-123456}
      SESSION_SECRET: ${SESSION_SECRET:-replace-with-a-long-random-secret}
      MEDIA_ROOT: /app/assets
      DATA_ROOT: /app/data
      TRASH_ROOT: /app/trash
      THUMB_ROOT: /app/thumbnails
    volumes:
      - ./assets:/app/assets
      - ./data:/app/data
      - ./trash:/app/trash
      - ./thumbnails:/app/thumbnails
    restart: unless-stopped
